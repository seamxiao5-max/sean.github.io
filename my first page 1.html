<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sean</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      cursor: none;
    }

    /* White bg with dot grid */
    #bg {
      position: fixed;
      inset: 0;
      background-color: #fff;
      background-image: radial-gradient(circle, #ccc 1px, transparent 1px);
      background-size: 28px 28px;
      z-index: 0;
    }

    /* Dark bg clipped to circle */
    #bg-dark {
      position: fixed;
      inset: 0;
      background-color: #0d0d0d;
      background-image: radial-gradient(circle, #2e2e2e 1px, transparent 1px);
      background-size: 28px 28px;
      clip-path: circle(0px at 50% 50%);
      z-index: 1;
    }

    /* Text containers centered and fixed */
    .text-layer {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #text-light { z-index: 2; }
    #text-dark  { z-index: 3; clip-path: circle(0px at 50% 50%); }

    /* Only the inner content box tilts */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      will-change: transform;
    }

    #text-light .headline {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(2.8rem, 7vw, 6rem);
      letter-spacing: -0.02em;
      line-height: 1;
      color: #111;
      user-select: none;
    }
    #text-light .headline em {
      font-style: italic;
      font-weight: 300;
      font-size: 0.88em;
      letter-spacing: 0.01em;
    }
    #text-light .sub {
      margin-top: 1.2rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(0.85rem, 1.6vw, 1.05rem);
      letter-spacing: 0.18em;
      color: #555;
      user-select: none;
    }

    #text-dark .headline {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(2.8rem, 7vw, 6rem);
      letter-spacing: -0.02em;
      line-height: 1;
      color: #f0f0f0;
      user-select: none;
    }
    #text-dark .sub {
      margin-top: 1.2rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: clamp(0.85rem, 1.6vw, 1.05rem);
      letter-spacing: 0.18em;
      color: #888;
      user-select: none;
    }

    /* Ring fixed in screen space */
    #ring {
      position: fixed;
      border-radius: 50%;
      border: 1.5px solid rgba(130,130,130,0.6);
      pointer-events: none;
      z-index: 10;
      transform: translate(-50%, -50%);
    }

    #cursor {
      position: fixed;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #999;
      pointer-events: none;
      z-index: 11;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>

  <div id="bg"></div>
  <div id="bg-dark"></div>

  <div class="text-layer" id="text-light">
    <div class="content" id="content-light">
      <h1 class="headline">HELLO, I'M <em>Sean</em></h1>
      <p class="sub">ndergraduate Student&nbsp;&nbsp;/&nbsp;&nbsp;20 years old&nbsp;&nbsp;/&nbsp;&nbsp;Suzhou, Jiangsu</p>
    </div>
  </div>

  <div class="text-layer" id="text-dark">
    <div class="content" id="content-dark">
      <h1 class="headline">你好，我是骁</h1>
      <p class="sub">大学本科生&nbsp;&nbsp;/&nbsp;&nbsp;20岁&nbsp;&nbsp;/&nbsp;&nbsp;江苏苏州</p>
    </div>
  </div>

  <div id="ring"></div>
  <div id="cursor"></div>

  <script>
    const bgDark       = document.getElementById('bg-dark');
    const textDark     = document.getElementById('text-dark');
    const ring         = document.getElementById('ring');
    const cursor       = document.getElementById('cursor');
    const textLight      = document.getElementById('text-light');
    const contentLight = document.getElementById('content-light');
    const contentDark  = document.getElementById('content-dark');

    const RADIUS   = 130;
    const MAX_TILT = 22;

    let mx = window.innerWidth  / 2;
    let my = window.innerHeight / 2;
    let tx = 0, ty = 0;

    function lerp(a, b, t) { return a + (b - a) * t; }

    function update() {
      const nx = (mx / window.innerWidth)  - 0.5;
      const ny = (my / window.innerHeight) - 0.5;

      tx = lerp(tx, -ny * MAX_TILT, 0.08);
      ty = lerp(ty,  nx * MAX_TILT, 0.08);

      // Only tilt the text content, not the backgrounds
      const tiltCSS = `perspective(600px) rotateX(${tx}deg) rotateY(${ty}deg)`;
      contentLight.style.transform = tiltCSS;
      contentDark.style.transform  = tiltCSS;

      // Clip dark layers using raw mouse pos (screen space, no tilt)
      const clip = `circle(${RADIUS}px at ${mx}px ${my}px)`;
      bgDark.style.clipPath   = clip;
      textDark.style.clipPath = clip;

      // Hide light text inside the circle using invert clip
      const clipOut = `path(evenodd, 'M0 0 H${window.innerWidth} V${window.innerHeight} H0 Z M${mx} ${my} m-${RADIUS},0 a${RADIUS},${RADIUS} 0 1,0 ${RADIUS*2},0 a${RADIUS},${RADIUS} 0 1,0 -${RADIUS*2},0')`;
      textLight.style.clipPath = clipOut;

      // Ring and cursor follow mouse directly
      ring.style.left   = mx + 'px';
      ring.style.top    = my + 'px';
      ring.style.width  = (RADIUS * 2) + 'px';
      ring.style.height = (RADIUS * 2) + 'px';

      cursor.style.left = mx + 'px';
      cursor.style.top  = my + 'px';

      requestAnimationFrame(update);
    }

    document.addEventListener('mousemove', e => {
      mx = e.clientX;
      my = e.clientY;
    });

    update();
  </script>
</body>
</html>
